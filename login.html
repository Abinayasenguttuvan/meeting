  <style>

  /* MOBILE */
  
  
  
  /* LOGIN BACKGROUND IMAGE */
  
  body{
  background:url("./meet2.webp") no-repeat center/cover;
  position:relative;
  }
  
  body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;
  left:0;
  z-index:-1;
  }
  
  /* ICON INITIAL HIDE */
  
  .brand-logos img{
  opacity:0;
  transform:translateY(30px);
  transition:0.6s ease;
  }
  
  .brand-logos img.show{
  opacity:1;
  transform:translateY(0);
  }
  </style>
  
  <script>
  
  window.addEventListener("load",()=>{
  
  let icons=document.querySelectorAll(".brand-logos img");
  
  icons.forEach((icon,index)=>{
  setTimeout(()=>{
  icon.classList.add("show");
  },index*500);
  });
  
  });
    function togglePassword(){
  
  let pass=document.getElementById("password");
  let icon=document.querySelector(".eye-icon");
  
  if(pass.type==="password"){
  pass.type="text";
  icon.classList.remove("fa-eye-slash");
  icon.classList.add("fa-eye");
  }else{
  pass.type="password";
  icon.classList.remove("fa-eye");
  icon.classList.add("fa-eye-slash");
  }
  
  }
  
  function validateLogin(){
  
  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();
  let error=document.getElementById("error");
  
  if(email==="" || password===""){
  error.innerText="Please enter email and password";
  }else{
  window.location.href="index.html";
  }
  
  }
  </script>
