    <Style>
        /* HERO SECTION */

.ab-hero-wave-section{

position:relative;
height:420px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background-image:url("./meet.webp");
background-size:cover;
background-position:center;

color:white;
overflow:hidden;

}

/* OVERLAY */

.ab-hero-overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.65)
);

}

/* CONTENT */

.ab-hero-container{

position:relative;
z-index:2;

}

.ab-hero-title{

font-size:48px;
font-weight:700;
margin-bottom:10px;

}

/* BREADCRUMB */

.ab-hero-breadcrumb{

font-size:18px;

}

.ab-hero-breadcrumb a{

color:#ffffff;
text-decoration:none;
font-weight:500;

}

.ab-hero-breadcrumb a:hover{

color: rgb(46, 217, 46);

}

.ab-hero-breadcrumb span{

margin:0 6px;

}

/* WAVE */

.ab-hero-wave{

position:absolute;
bottom:-1px;
left:0;
width:100%;
line-height:0;

}

.ab-hero-wave svg{

width:100%;
height:120px;

}

/* RESPONSIVE */

@media(max-width:992px){

.ab-hero-title{
font-size:36px;
}

}

@media(max-width:600px){

.ab-hero-title{
font-size:28px;
}

.ab-hero-wave-section{
height:340px;
}

.ab-hero-breadcrumb{
font-size:16px;
}

}
    </Style>
